<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Multilink | Hubungkan Semua Medsosmu</title>
    <style>
        /* Reset & Base Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* Container Card */
        .container {
            width: 100%;
            max-width: 450px;
            text-align: center;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            padding: 40px 20px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        /* Profile Section */
        .profile-img {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #38bdf8;
            margin-bottom: 16px;
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.4);
        }

        .name {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 4px;
            letter-spacing: 0.5px;
        }

        .bio {
            font-size: 0.95rem;
            color: #94a3b8;
            margin-bottom: 32px;
        }

        /* Links Section */
        .links-wrapper {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .link-item {
            display: block;
            padding: 16px;
            background: rgba(255, 255, 255, 0.07);
            color: #ffffff;
            text-decoration: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* Hover Effects */
        .link-item:hover {
            background: #38bdf8;
            color: #0f172a;
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(56, 189, 248, 0.2);
        }

        /* Footer */
        .footer {
            margin-top: 40px;
            font-size: 0.8rem;
            color: #64748b;
        }
        
        .footer a {
            color: #38bdf8;
            text-decoration: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Foto Profil -->
        <!-- Ganti URL gambar di bawah ini dengan foto kamu sendiri -->
        <img src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?auto=format&fit=crop&w=200&q=80" alt="Foto Profil" class="profile-img">

        <!-- Nama dan Bio -->
        <h1 class="name">Nama Anda</h1>
        <p class="bio">Digital Creator | Berbagi tips seputar teknologi & desain setiap hari ✨</p>

        <!-- Daftar Link -->
        <div class="links-wrapper">
            <!-- Ganti tanda # dengan link aktif milikmu -->
            <a href="#" target="_blank" class="https://rs-kariadi.go.id/">🌐 Website RS Kariadi Semarang</a>
            <a href="#" target="_blank" class="link-item">📸 Instagram</a>
            <a href="#" target="_blank" class="link-item">🎬 YouTube Channel</a>
            <a href="#" target="_blank" class="link-item">💼 LinkedIn Profile</a>
            <a href="#" target="_blank" class="link-item">💬 Hubungi via WhatsApp</a>
        </div>

        <!-- Footer Optional -->
        <div class="footer">
            © 2026 Instalasi Eksekutif. Dibuat dengan ❤️
        </div>
    </div>

</body>
</html>
